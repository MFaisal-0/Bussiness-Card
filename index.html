<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="container">
            <div class="Result">
                <h2>Your Result</h2>
                <div class="Circle">
                    <p class="score-value">76</p>
                    <p class="score-out-of">of 100</p>
                </div>
                <h3>Great</h3>
                <div class="higher-score">
                    Your scored higher than 65% of the people who have taken these tests
                </div>
            </div>
            <div class="Summary">
                <h2>Summary</h2>
                <div class="container-summary">
                    <div class="Reaction">
                        <span><img src="./Assats/reaction.png.png" alt="Reaction"></span>
                        <span>Reaction</span>
                        <span class="score-Reaction">80</span>
                        <span class="score-Reaction-out-of">/ 100</span>
                    </div>
                    <div class="Memory">
                        <span><img src="./Assats/memory.png" alt="Memory"></span>
                        <span>Memory</span>
                        <span class="score-Memory">92</span>
                        <span class="score-Memory-out-of">/ 100</span>
                    </div>
                    <div class="Verbal">
                        <span><img src="./Assats/verbal.png" alt="Verbal"></span>
                        <span>Verbal</span>
                        <span class="score-Verbal">61</span>
                        <span class="score-Verbal-out-of">/ 100</span>
                    </div>
                    <div class="Visual">
                        <span><img src="./Assats/visual.png" alt="Visual"></span>
                        <span>Visual</span>
                        <span class="score-Visual">73</span>
                        <span class="score-Visual-out-of">/ 100</span>
                    </div>
                    <button>
                        contuinue
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
